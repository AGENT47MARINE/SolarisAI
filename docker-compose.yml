version: "3.9"

services:
  backend:
    build: ./backend
    ports: ["8000:8000"]
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./solaris.db
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-prod}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - STT_PROVIDER=browser
      - VOICE_ENABLED=true
      - NAV_SUGGESTIONS_ENABLED=true
    volumes:
      - ./backend/app/ml/models:/app/app/ml/models
      - ./backend/app/ml/data:/app/app/ml/data

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports: ["3000:80"]
    depends_on: [backend]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
