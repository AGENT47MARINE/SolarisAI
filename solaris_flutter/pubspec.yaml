name: solaris_flutter
description: A scalable, high-performance Flutter application for SolarisAI dashboard.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  dio: ^5.4.0
  json_annotation: ^4.8.1
  fl_chart: ^0.65.0
  syncfusion_flutter_charts: ^24.1.41
  syncfusion_flutter_datagrid: ^24.1.41
  syncfusion_flutter_core: ^24.1.41
  syncfusion_flutter_gauges: ^24.1.41
  intl: ^0.18.1
  shared_preferences: ^2.2.2
  go_router: ^12.1.1
  lucide_icons: ^0.257.0 # Adding lucide icons package to match react
  google_fonts: ^6.1.0
  speech_to_text: ^6.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
